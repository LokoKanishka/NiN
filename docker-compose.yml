version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-lucy
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/Santiago # Adjust as needed
      - N8N_USER_MANAGEMENT_JWT_SECRET=cf205e3acd53f369b6311e0faf363698b2dcf295b6390746944bc678a1ac02b3
      - N8N_AUTH_COOKIE_SECURE=false
      - N8N_PUBLIC_API_DISABLED=false
      - OLLAMA_HOST=http://host.docker.internal:11434
    volumes:
      - n8n_data:/home/node/.n8n
      - ./data:/data
      - ~/.n8n-custom-extension:/home/node/.n8n/custom
      - ~/Escritorio/Cerebro:/mnt/Cerebro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-lucy
    restart: always
    ports:
      - "6335:6333"
      - "6336:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  searxng:
    image: searxng/searxng:latest
    container_name: searxng-lucy
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

volumes:
  n8n_data:
  qdrant_data:
